<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BMS Monitor · Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --brand: #00e5a0;
      --bg: #0a0d12;
      --surface: #111720;
      --border: #1f2d42;
      --muted: #6b7f99;
    }
    body {
      background: var(--bg);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-box {
      width: 100%;
      max-width: 380px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem 2rem;
    }
    .logo {
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--brand);
      margin-bottom: 0.25rem;
    }
    .subtitle {
      font-size: 0.7rem;
      font-family: 'JetBrains Mono', monospace;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 2rem;
    }
    .form-control {
      background: #0a0d12;
      border-color: var(--border);
      color: #e2eaf5;
      font-family: 'JetBrains Mono', monospace;
    }
    .form-control:focus {
      background: #0a0d12;
      border-color: var(--brand);
      color: #e2eaf5;
      box-shadow: 0 0 0 2px rgba(0,229,160,0.15);
    }
    .btn-brand {
      background: var(--brand);
      color: #0a0d12;
      font-weight: 700;
      border: none;
      width: 100%;
      padding: 0.6rem;
      border-radius: 8px;
      font-family: 'Syne', sans-serif;
      font-size: 0.9rem;
      transition: opacity 0.15s;
    }
    .btn-brand:hover { opacity: 0.85; }
    .form-label { font-size: 0.75rem; font-family: 'JetBrains Mono', monospace; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="logo"><i class="bi bi-lightning-charge-fill"></i> BMS Monitor</div>
    <div class="subtitle">Daly BMS · Secure Access</div>

    {% if error %}
    <div class="alert alert-danger py-2" style="font-size:0.8rem; border-radius:8px;">
      <i class="bi bi-exclamation-triangle me-1"></i> {{ error }}
    </div>
    {% endif %}

    <form method="POST">
      <div class="mb-3">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control" autofocus autocomplete="username">
      </div>
      <div class="mb-4">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" autocomplete="current-password">
      </div>
      <button type="submit" class="btn-brand">Sign In <i class="bi bi-arrow-right ms-1"></i></button>
    </form>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</body>
</html>
